<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Фавикон 256x256 -->
    <link rel="icon" type="image/png" href="/ULBP/ULBP.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ULBP HUB</title>

    <!-- Мета-теги для соцсетей (Open Graph / Telegram / VK) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ULBP HUB">
    <meta property="og:description" content="Ultimate LittleBigPlanet Hub — уровни, новости и сообщество проекта.">
    <meta property="og:url" content="https://ulbp.vercel.app/">
    
    <!-- Большой постер (баннер) для ТГ и ВК -->
    <meta property="og:image" content="https://ulbp.vercel.app/ULBP/BG.png">
    <meta property="og:image:width" content="1930">
    <meta property="og:image:height" content="1080">

    <!-- Twitter Card (нужен для корректного отображения больших картинок в Telegram) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ULBP HUB">
    <meta name="twitter:description" content="Добро пожаловать в хаб ULBP.">
    <meta name="twitter:image" content="https://ulbp.vercel.app/ULBP/BG.png">

    <!-- Каноническая ссылка для SEO, так как у тебя много доменов с редиректом -->
    <link rel="canonical" href="https://ulbp.vercel.app/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
